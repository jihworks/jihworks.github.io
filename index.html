    <style>
        :root {
            --bg-color: #121212;
            --text-main: #f0f0f0;
            --text-sub: #a1a1a6;
            --border-color: #333333;
            --hover-bg: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .container {
            text-align: center;
            width: 40%;
            min-width: 400px;
            padding: 20px;
        }

        .logo {
            margin-bottom: 0px;
        }

        .logo svg {
            width: 100%;
            height: auto;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px;
            text-decoration: none;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-main);
        }

        .label {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .url {
            font-size: 0.85rem;
            color: var(--text-sub);
            word-break: break-all;
        }

        .url {
            user-select: all;
        }
    </style>
</head>
